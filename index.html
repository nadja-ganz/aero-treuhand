<!DOCTYPE html>
<html lang="de">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;

        .container {
            text-align: center;
            max-width: 600px;

            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.25rem);
            opacity: 0.9;
